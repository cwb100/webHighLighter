<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Highlighter Console</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header class="header">
    <div>
      <h1>Web Highlighter Console</h1>
      <p>查看所有已划线网页和对应标记</p>
    </div>
    <div class="header-actions">
      <button id="export-data-btn" type="button">导出数据</button>
      <button id="import-data-btn" type="button">导入数据</button>
      <button id="refresh-btn" type="button">刷新</button>
      <input id="import-file-input" type="file" accept="application/json,.json" hidden>
    </div>
  </header>

  <main class="main">
    <section class="search-card">
      <div class="search-title-row">
        <h2 class="search-title">搜索标记</h2>
        <button id="clear-search-btn" type="button">清空筛选</button>
      </div>

      <div class="search-grid">
        <label class="search-field">
          <span>标题</span>
          <input id="filter-title" type="search" placeholder="按页面标题筛选" autocomplete="off">
        </label>
        <label class="search-field">
          <span>网址</span>
          <input id="filter-url" type="search" placeholder="按网址筛选" autocomplete="off">
        </label>
        <label class="search-field search-field-wide">
          <span>标记文本</span>
          <input id="filter-text" type="search" placeholder="按高亮文本筛选" autocomplete="off">
        </label>
        <label class="search-field">
          <span>颜色</span>
          <input id="filter-color" type="search" placeholder="#fff59d" autocomplete="off">
        </label>
        <label class="search-field">
          <span>日期</span>
          <input id="filter-date" type="date">
        </label>
      </div>

      <div id="dashboard-status" class="search-help" aria-live="polite">
        点击标记可在新标签页打开对应网页；筛选条件为空时会被忽略，多个条件会同时生效。
      </div>
    </section>

    <section class="summary">
      <div class="summary-card">
        <span class="summary-label">网页数量</span>
        <strong id="page-count">0</strong>
      </div>
      <div class="summary-card">
        <span class="summary-label">标记总数</span>
        <strong id="highlight-count">0</strong>
      </div>
    </section>

    <section id="pages" class="pages"></section>
  </main>

  <script src="storage.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
