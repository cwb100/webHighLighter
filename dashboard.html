<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Highlighter Console</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header class="header">
    <div>
      <h1>Web Highlighter Console</h1>
      <p>查看所有已划线网页和对应标记</p>
    </div>
    <div class="header-actions">
      <button id="refresh-btn" type="button">刷新</button>
    </div>
  </header>

  <main class="main">
    <section class="search-card">
      <label class="search-label" for="search-input">搜索标记</label>
      <div class="search-row">
        <input id="search-input" type="search" placeholder="title:文章 url:example.com text:重点 color:#fff59d date:2026-06-06" autocomplete="off">
        <button id="clear-search-btn" type="button">清空</button>
      </div>
      <div class="search-help">
        支持标签：<code>title:</code> <code>url:</code> <code>text:</code> <code>color:</code> <code>date:</code>，不带标签时默认同时匹配标题、URL 和划线文本。
      </div>
    </section>

    <section class="summary">
      <div class="summary-card">
        <span class="summary-label">网页数量</span>
        <strong id="page-count">0</strong>
      </div>
      <div class="summary-card">
        <span class="summary-label">标记总数</span>
        <strong id="highlight-count">0</strong>
      </div>
    </section>

    <section id="pages" class="pages"></section>
  </main>

  <script src="storage.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
